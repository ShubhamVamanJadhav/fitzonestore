<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FitZone Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, var(--darker), #1a1a2e);
            padding: 3rem 2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info h1 { margin: 0; font-size: 2rem; }
        .user-info p { color: var(--text-muted); margin-top: 0.5rem; }
        .role-badge {
            background: var(--primary);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .d-card {
            background: var(--darker);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 2rem;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .d-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .d-card i { font-size: 2.5rem; color: var(--primary); opacity: 0.2; position: absolute; right: 20px; top: 20px; }
        .d-card h3 { margin-bottom: 1rem; font-size: 1.4rem; }
        .d-card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .order-item:last-child { border-bottom: none; }
        .order-id { font-weight: 600; color: var(--primary); }
        .order-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <nav style="background: var(--darker); border-bottom: 1px solid var(--border);">
        <div class="logo"><a href="index.html">FIT<span>ZONE</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <div id="auth-links" style="display:inline-flex; gap: 2rem;"></div>
            <li>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-count">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="container" style="padding-top: 120px; min-height: 80vh;">
        <div class="dashboard-header reveal">
            <div class="user-info">
                <h1 id="welcome-name">Welcome, User</h1>
                <p>Manage your account, orders, and shop all in one place.</p>
            </div>
            <div id="role-container">
                <span class="role-badge" id="user-role">Customer</span>
            </div>
        </div>

        <div class="dashboard-cards">
            <!-- User Section -->
            <div class="d-card reveal">
                <i class="fas fa-shopping-bag"></i>
                <h3>Your Orders</h3>
                <p>Track your fitness gear deliveries and view order history.</p>
                <div id="recent-orders-list">
                    <p style="font-size: 0.9rem;">No recent orders found.</p>
                </div>
                <button class="btn" style="width: 100%; margin-top: 1rem;" onclick="window.location.href='products.html'">Browse Products</button>
            </div>

            <!-- Seller Section / Become Seller Section -->
            <div class="d-card reveal" id="seller-action-card">
                <!-- Content injected by JS based on role -->
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 FitZone Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('fitzone_user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('welcome-name').textContent = `Welcome, ${user.name}`;
            const roleBadge = document.getElementById('user-role');
            roleBadge.textContent = user.role === 'seller' ? 'Seller' : 'Customer';
            if(user.role === 'seller') roleBadge.style.background = '#e74c3c';

            const sellerCard = document.getElementById('seller-action-card');
            if (user.role === 'seller') {
                sellerCard.innerHTML = `
                    <i class="fas fa-store"></i>
                    <h3>Seller Panel</h3>
                    <p>Manage your inventory, track sales performance, and add new premium gym equipment.</p>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="btn" onclick="window.location.href='/seller-dashboard'">Go to Shop Manager</button>
                        <button class="btn btn-outline" style="background:transparent; border:1px solid var(--primary); color:var(--primary);" onclick="window.location.href='/seller-dashboard'">Add New Product</button>
                    </div>
                `;
            } else {
                sellerCard.innerHTML = `
                    <i class="fas fa-rocket"></i>
                    <h3>Become a Seller</h3>
                    <p>Want to sell your fitness products on FitZone? Join our community of professional retailers.</p>
                    <button class="btn" style="width: 100%; background: linear-gradient(135deg, #f1c40f, #f39c12); color:#000;" onclick="becomeSeller()">Start Selling Now</button>
                `;
            }

            // Render Orders from localStorage
            const orders = JSON.parse(localStorage.getItem('fitzone_orders')) || [];
            const userOrders = orders.filter(o => o.user_id === user.id).reverse().slice(0, 3);
            const ordersContainer = document.getElementById('recent-orders-list');
            
            if (userOrders.length > 0) {
                ordersContainer.innerHTML = userOrders.map(o => `
                    <div class="order-item">
                        <div>
                            <div class="order-id">${o.local_order_id}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">${new Date(o.created_at).toLocaleDateString()}</div>
                        </div>
                        <div>
                            <span class="order-status">${o.status.toUpperCase()}</span>
                            <div style="font-weight:700; margin-top:4px;">₹${o.amount}</div>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>

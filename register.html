<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FitZone Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav style="background: var(--darker); border-bottom: 1px solid var(--border);">
        <div class="logo"><a href="index.html">FIT<span>ZONE</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="container" style="padding-top: 120px; min-height: 80vh;">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Register As</label>
                    <select id="role" class="form-control">
                        <option value="user">Customer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary);">Login here</a>
            </p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 FitZone Store.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>

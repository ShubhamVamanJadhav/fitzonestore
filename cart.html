<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | FitZone Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav style="background: var(--darker); border-bottom: 1px solid var(--border);">
        <div class="logo">
            <a href="index.html">FIT<span>ZONE</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <div id="auth-links" style="display:inline-flex; gap: 2rem;">
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </div>
            <li>
                <a href="cart.html" class="cart-icon" style="color:var(--primary);">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-count">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="container" style="padding-top: 120px; min-height: 80vh;">
        <h1 class="section-title">Your <span>Cart</span></h1>
        
        <div style="background: var(--glass); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; overflow-x: auto;">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-tbody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: 2rem;">
            <div class="cart-summary">
                <h3 style="margin-bottom: 1rem;">Total: <span id="cart-total" style="color: var(--primary);">₹0.00</span></h3>
                <a href="checkout.html" class="btn" style="width: 100%; text-align: center;">Proceed to Checkout</a>
            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 FitZone Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
